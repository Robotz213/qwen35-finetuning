# Configuracao conservadora para maquina sem GPU dedicada e com 16 GB de RAM.
# Observacao: treino em CPU e muito lento. Use para validar pipeline e treinos pequenos.

model_name_or_path: Qwen/Qwen3.5-0.8B
train_file: data/sample_train.jsonl
output_dir: outputs/qwen35-lora-cpu-16gb

device_map: cpu
torch_dtype: float32

max_seq_length: 512
packing: false
assistant_only_loss: false

load_in_4bit: false

lora_r: 4
lora_alpha: 8
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - v_proj

num_train_epochs: 1
max_steps: -1
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 0.0001
weight_decay: 0.0
warmup_ratio: 0.03
lr_scheduler_type: cosine

logging_steps: 1
save_steps: 50
save_total_limit: 1
bf16: false
fp16: false
gradient_checkpointing: true
optim: adamw_torch
report_to: none
seed: 42
