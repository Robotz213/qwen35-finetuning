model_name_or_path: Qwen/Qwen3.5-0.8B
train_file: data/sample_train.jsonl
output_dir: outputs/qwen35-lora-no-bnb

max_seq_length: 1024
packing: false
assistant_only_loss: false

load_in_4bit: false

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

num_train_epochs: 1
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 0.0002
weight_decay: 0.0
warmup_ratio: 0.03
lr_scheduler_type: cosine

logging_steps: 5
save_steps: 100
save_total_limit: 2
bf16: false
fp16: true
gradient_checkpointing: true
optim: adamw_torch
report_to: none
seed: 42
